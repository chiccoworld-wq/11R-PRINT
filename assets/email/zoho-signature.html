<!--
  11R PRINT — Zoho Mail HTML Signature
  How to install:
  1. Go to Zoho Mail → Settings → Signatures
  2. Click "Create Signature"
  3. Switch editor to "HTML" mode (toggle in top-right of editor)
  4. Paste everything between the <body> tags below
  5. Save and set as default signature
-->
<!DOCTYPE html>
<html>
<body>
<table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, sans-serif; max-width: 480px;">
  <tr>
    <td style="padding: 16px 0 8px 0;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <!-- Logo -->
          <td style="padding-right: 18px; border-right: 3px solid #1a7a1a; vertical-align: middle;">
            <a href="https://11rprint.com" target="_blank" style="display: block;">
              <img
                src="https://11rprint.com/images/11R%20VECTOR%20FINAL%20SVG.png"
                alt="11R Print"
                width="72"
                height="72"
                style="display: block; border: none; outline: none;"
              />
            </a>
          </td>
          <!-- Info -->
          <td style="padding-left: 18px; vertical-align: middle;">
            <p style="margin: 0 0 1px 0; font-size: 15px; font-weight: bold; color: #000000; letter-spacing: 0.5px;">11R PRINT</p>
            <p style="margin: 0 0 10px 0; font-size: 11px; color: #666666; text-transform: uppercase; letter-spacing: 1.2px;">Custom Screen Printing &amp; Design</p>
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-bottom: 4px; font-size: 13px; color: #333333;">
                  ✉&nbsp;
                  <a href="mailto:Orders@11rprint.com" style="color: #1a7a1a; text-decoration: none; font-weight: 500;">Orders@11rprint.com</a>
                </td>
              </tr>
              <tr>
                <td style="padding-bottom: 4px; font-size: 13px; color: #333333;">
                  🌐&nbsp;
                  <a href="https://11rprint.com" target="_blank" style="color: #1a7a1a; text-decoration: none; font-weight: 500;">11rprint.com</a>
                </td>
              </tr>
              <tr>
                <td style="font-size: 13px; color: #333333;">
                  📸&nbsp;
                  <a href="https://instagram.com/11RPRINT" target="_blank" style="color: #1a7a1a; text-decoration: none; font-weight: 500;">@11RPRINT</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <!-- Bottom accent bar -->
  <tr>
    <td>
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="height: 3px; background-color: #000000; width: 40%;"></td>
          <td style="height: 3px; background-color: #1a7a1a; width: 60%;"></td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
