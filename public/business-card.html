<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11R Print — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Grotesk', sans-serif;
    gap: 60px;
    padding: 60px 40px;
  }

  .label {
    color: #555;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── BUSINESS CARD: 3.5 × 2 inch @ 96dpi = 336 × 192px, scaled 2.5x for screen ── */
  .card {
    width: 840px;
    height: 480px;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* ════════════════════════════════
     FRONT
  ════════════════════════════════ */
  .card-front {
    background: #0a0a0a;
  }

  /* halftone dot texture */
  .card-front::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  /* green accent bar left */
  .card-front .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #1f8a3a;
  }

  .card-front .inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 44px 52px 44px 72px;
  }

  .card-front .logo-zone {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .card-front .logo-zone img {
    height: 100px;
    width: auto;
    filter: drop-shadow(0 0 20px rgba(31,138,58,0.3));
  }

  .card-front .tagline {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #1f8a3a;
    border-left: 2px solid #1f8a3a;
    padding-left: 12px;
    line-height: 1.6;
  }

  .card-front .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card-front .name {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .card-front .role {
    font-size: 10.5px;
    font-weight: 400;
    color: #666;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card-front .screen-print-badge {
    background: #1f8a3a;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 3px;
  }

  /* ════════════════════════════════
     BACK
  ════════════════════════════════ */
  .card-back {
    background: #0f0f0f;
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(31,138,58,0.06) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    pointer-events: none;
  }

  /* large ghost "11R" watermark */
  .card-back .watermark {
    position: absolute;
    right: -30px;
    bottom: -60px;
    font-size: 340px;
    font-weight: 900;
    color: rgba(255,255,255,0.02);
    letter-spacing: -0.05em;
    line-height: 1;
    user-select: none;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* top green band */
  .card-back .top-band {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #1f8a3a 0%, #25a847 50%, #1f8a3a 100%);
  }

  .card-back .inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 64px;
    gap: 26px;
  }

  .card-back .contact-block {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .card-back .contact-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .card-back .icon {
    width: 32px;
    height: 32px;
    background: rgba(31,138,58,0.15);
    border: 1px solid rgba(31,138,58,0.35);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-back .icon svg {
    width: 15px;
    height: 15px;
    fill: #1f8a3a;
  }

  .card-back .contact-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card-back .contact-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    font-family: 'Inter', sans-serif;
  }

  .card-back .contact-value {
    font-size: 15px;
    font-weight: 600;
    color: #e8e8e8;
    letter-spacing: 0.01em;
  }

  .card-back .divider {
    width: 40px;
    height: 2px;
    background: #1f8a3a;
    border-radius: 1px;
  }

  .card-back .web {
    font-size: 11px;
    color: #333;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ── print note ── */
  .print-note {
    color: #333;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 20px;
    font-family: 'Inter', sans-serif;
  }

  @media print {
    body { background: white; }
    .label, .print-note { display: none; }
  }
</style>
</head>
<body>

<!-- ── FRONT ── -->
<div class="card-wrapper">
  <p class="label">Front</p>
  <div class="card card-front">
    <div class="accent-bar"></div>
    <div class="inner">
      <div class="logo-zone">
        <img src="images/11r-logo-new.png" alt="11R Print Logo">
        <div class="tagline">Screen<br>Printing</div>
      </div>
      <div class="bottom-row">
        <div>
          <div class="name">11R PRINT</div>
          <div class="role">Custom Screen Printing</div>
        </div>
        <div class="screen-print-badge">Est. NYC</div>
      </div>
    </div>
  </div>
</div>

<!-- ── BACK ── -->
<div class="card-wrapper">
  <p class="label">Back</p>
  <div class="card card-back">
    <div class="top-band"></div>
    <div class="watermark">11R</div>
    <div class="inner">
      <div class="contact-block">

        <div class="contact-row">
          <div class="icon">
            <!-- email icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4H4C2.897 4 2 4.897 2 6v12c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V6c0-1.103-.897-2-2-2zm0 2v.511l-8 6.4-8-6.4V6h16zM4 18V9.489l8 6.4 8-6.4V18H4z"/>
            </svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Email</span>
            <span class="contact-value">Orders@11rprint.com</span>
          </div>
        </div>

        <div class="contact-row">
          <div class="icon">
            <!-- instagram icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Instagram</span>
            <span class="contact-value">@11rprint</span>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <div class="web">11rprint.com</div>
    </div>
  </div>
</div>

<p class="print-note">Standard 3.5 × 2 in — Export at 300 DPI for print</p>

</body>
</html>
