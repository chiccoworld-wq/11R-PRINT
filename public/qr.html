<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/images/11r-logo-black.png" />
<title>11R Print — QR Code</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #1f8a3a;
    --green-light: #25a847;
  }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 48px;
  }

  /* ── QR card ── */
  .qr-card {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 40px 80px rgba(0,0,0,0.6);
    max-width: 340px;
    width: 100%;
  }

  .qr-logo {
    height: 44px;
    width: auto;
    /* logo is white/light on dark; invert for white card */
    filter: invert(1);
  }

  .qr-image {
    width: 220px;
    height: 220px;
    border-radius: 8px;
    display: block;
  }

  .qr-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #aaa;
    font-family: 'Inter', sans-serif;
    text-align: center;
  }

  .qr-url {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .qr-divider {
    width: 40px;
    height: 2px;
    background: var(--green);
    border-radius: 1px;
  }

  /* ── instructions ── */
  .info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }

  .info h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .info p {
    font-size: 13px;
    color: #555;
    font-family: 'Inter', sans-serif;
    max-width: 280px;
    line-height: 1.6;
  }

  /* ── print button ── */
  .print-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--green);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    text-decoration: none;
  }

  .print-btn:hover { background: #25a847; transform: translateY(-1px); }
  .print-btn:active { transform: scale(0.97); }

  .print-btn svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }

  /* ── preview link ── */
  .preview-link {
    font-size: 12px;
    color: #444;
    font-family: 'Inter', sans-serif;
    text-align: center;
  }

  .preview-link a {
    color: var(--green-light);
    text-decoration: none;
  }

  /* ── print styles ── */
  @media print {
    body {
      background: white;
      gap: 24px;
    }
    .qr-card {
      box-shadow: none;
      border: 1px solid #eee;
    }
    .qr-logo { filter: none; }
    .print-btn, .info h2, .info p, .preview-link { display: none; }
  }
</style>
</head>
<body>

<div class="qr-card">
  <img class="qr-logo" src="images/11r-logo-new.png" alt="11R Print">
  <div class="qr-divider"></div>
  <img
    class="qr-image"
    src="https://api.qrserver.com/v1/create-qr-code/?size=440x440&format=png&color=0a0a0a&bgcolor=ffffff&qzone=2&data=https%3A%2F%2F11rprint.com%2Flink.html"
    alt="QR code for 11R Print contact page"
    loading="lazy"
  >
  <div class="qr-label">Scan to connect</div>
  <div class="qr-url">11rprint.com/link.html</div>
</div>

<div class="info">
  <h2>Your QR Code</h2>
  <p>Point a phone camera at this code — it opens the 11R contact page where people can tap to Instagram or email you.</p>
</div>

<button class="print-btn" onclick="window.print()">
  <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
  Print / Save PDF
</button>

<p class="preview-link">
  See the landing page → <a href="link.html" target="_blank">11rprint.com/link.html</a>
</p>

</body>
</html>
